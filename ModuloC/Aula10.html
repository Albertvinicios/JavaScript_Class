<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interação com JS+HTML</title>
    <style>
        div#area{
            background: rgb(6, 230, 6);
            color: white;
            width: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrando()" onmouseout="saindo()">
        interaja...
    </div> <!--onclick se clicar aciona o método js e assim por diante-->

    <script>
        // a parte de cima faz o html chamar os métodos, MAS ELES PODEM
        // ser tratados direto no javascript.
        var a = window.document.getElementsByTagName('div')[0]; //0 é a primeira div, ou seja
        //nesse caso a única. Pegando a div para tratar os eventos.
        //criando a variável fora da function, posso repetir nelas, caso crie dentro não.
        function clicar(){
            var clicou = window.document.querySelector('div#area');//variável clicou para pegar a div
            //e alterar o texto e a cor.
            clicou.innerText = 'Clicou!!'; //inner text para alterar o texto da div
            //clicou é a variável que pegou a div, e o innerText é o texto dela.
            a.style.background = "red"; //alterando a cor da div, utilizando a variável a
            //que é a div, e o estilo de background.
    
        }
        function entrando(){
            var entrou = window.document.getElementById("area"); //variável entrou para pegar a div por id
            // para alterar o texto e a cor.
            entrou.innerText = "Entrando na área!"; //altera o texto
            a.style.background = "blue"; //muda o background para azul

        }
        function saindo(){ //métodos em java script, para tratar os eventos do html.
            a.innerText = "Saindo da área!"; //alterando o texto
            a.style.background = "green"; //altera cor de fundo
            a.style.color = "black"; //altera cor da letra.
        }

    </script>
</body>
</html>
